<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Habit Tracker</title>
    <link rel="stylesheet" href="css/tracker.css">
        <link rel="icon" type="image/x-icon" href="/tracker/image.png">
</head>
<body>

    <h1 id="monthName">MONTH</h1>
    <h2>MONTHLY HABITS</h2>

    <div id="calendarcontainer">
        <div id="calendarDiv">
            <div id="calendarHeading">
                <p id="habitTitle"><b>My New Habit</b></p>
                <p id="TotalDays"><span id="count">0</span>/<span id="maxDays">31</span></p>
            </div>

            <div id="eventInputSection">
                <input type="text" id="eventText" placeholder="Type event then click a day">
            </div>

            <div class="Days" id="daysGrid"></div>
        </div>
    </div>
    <div id="calendercontent"></div>

<div id="Tracker">

<div class="Days">

<div class="Day1"></div>

<div class="Day2"></div>

<div class="Day3"></div>

<div class="Day4"></div>

<div class="Day5"></div>

<div class="Day6"></div>

<div class="Day7"></div>

<div class="Day8"></div>

<div class="Day9"></div>

<div class="Day10"></div>

<div class="Day11"></div>

<div class="Day12"></div>

<div class="Day13"></div>

<div class="Day14"></div>

<div class="Day15"></div>

<div class="Day16"></div>

<div class="Day17"></div>

<div class="Day18"></div>

<div class="Day19"></div>

<div class="Day20"></div>

<div class="Day21"></div>

<div class="Day22"></div>

<div class="Day23"></div>

<div class="Day24"></div>

<div class="Day25"></div>

<div class="Day26"></div>

<div class="Day27"></div>

<div class="Day28"></div>

<div class="Day29"></div>

<div class="Day30"></div>

<div class="Day31"></div>

</div>

    <button id="resetbutton">Reset Tracker</button>

    <script src="js/tracker.js"></script>
</body>
</html>
